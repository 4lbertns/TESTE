<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Planilha Financeira</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tela de Login -->
    <div id="login-section" class="container">
        <div class="login-box">
            <h2>Acesso Restrito</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Sua senha secreta" required>
                </div>
                <button type="submit">Entrar</button>
                <p id="login-error" class="error-msg"></p>
            </form>
        </div>
    </div>

    <!-- Interface da Planilha (Oculta por padrão) -->
    <div id="app-section" class="container hidden">
        <header>
            <h2>Planilha de Gastos</h2>
            <button id="logout-btn" class="btn-secondary">Sair</button>
        </header>
        
        <div class="add-expense-bar">
            <input type="date" id="exp-date" required>
            <input type="text" id="exp-desc" placeholder="Descrição do gasto" required>
            <input type="number" id="exp-amount" placeholder="Valor (R$)" step="0.01" required>
            <button id="add-btn">Adicionar</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Valor (R$)</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="expense-list"></tbody>
            </table>
        </div>

        <div class="total-bar">
            <h3>Gasto Total: <span id="total-amount">R$ 0,00</span></h3>
        </div>
    </div>

    <!-- Referência corrigida para o seu arquivo -->
    <script src="arq.js"></script>
</body>
</html>
